services:
  supertonic:
    build: .
    container_name: supertonic-api
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8032}:${PORT:-8032}"
    volumes:
      - supertonic-models:/app/assets
    environment:
      - ONNX_DIR=/app/assets/onnx
      - VOICE_STYLES_DIR=/app/assets/voice_styles
      - DEFAULT_VOICE=${DEFAULT_VOICE:-M1}
      - USE_GPU=0
      - PORT=${PORT:-8032}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PORT:-8032}/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # To enable GPU support (NVIDIA), uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  supertonic-models:
    driver: local
