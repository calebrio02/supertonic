version: '3.8'

services:
  supertonic:
    build: .
    container_name: supertonic-api
    ports:
      # Maps the host port to the container port. Configurable via .env file or environment variable.
      - "${HOST_PORT:-8032}:${PORT:-8032}"
    volumes:
      # Mount the assets directory containing the models (onnx/ and voice_styles/)
      - ./assets:/app/assets
    environment:
      - ONNX_DIR=/app/assets/onnx
      - VOICE_STYLES_DIR=/app/assets/voice_styles
      - DEFAULT_VOICE=${DEFAULT_VOICE:-M1}
      - USE_GPU=0
      - PORT=${PORT:-8032}
    # To enable GPU support later (e.g. NVIDIA), uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
